<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="112" y="168" width="288" height="248" rx="24" fill="white" opacity="0.95"/>
  <!-- Calendar top bar -->
  <rect x="112" y="168" width="288" height="64" rx="24" fill="white"/>
  <rect x="112" y="208" width="288" height="24" fill="white"/>
  <!-- Calendar top binding posts -->
  <rect x="184" y="128" width="20" height="64" rx="10" fill="white" opacity="0.95"/>
  <rect x="308" y="128" width="20" height="64" rx="10" fill="white" opacity="0.95"/>
  <!-- Calendar header line -->
  <line x1="136" y1="232" x2="376" y2="232" stroke="#2563eb" stroke-width="3" opacity="0.3"/>
  <!-- Sync arrows (circular) -->
  <g transform="translate(256, 328)" fill="none" stroke="#2563eb" stroke-width="16" stroke-linecap="round">
    <!-- Top arc -->
    <path d="M-48,-36 A60,60 0 0,1 48,-36"/>
    <!-- Arrow head top -->
    <path d="M36,-62 L48,-36 L22,-30" stroke-width="14"/>
    <!-- Bottom arc -->
    <path d="M48,36 A60,60 0 0,1 -48,36"/>
    <!-- Arrow head bottom -->
    <path d="M-36,62 L-48,36 L-22,30" stroke-width="14"/>
  </g>
</svg>
